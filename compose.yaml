services:
  frontproxy:
    build:
      context: frontproxy
    ports:
      - '8000:8000'
    depends_on:
      - alloy
      - frontend
    volumes:
      - ./frontproxy/nginx.conf:/etc/nginx/nginx.conf

  frontend:
    build: frontend
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    depends_on:
      - products

  products:
    build:
     context: products
    ports:
      - '8002:8002'
    volumes:
      - ./products/app.py:/app/app.py
    depends_on:
      - redis

  checkout:
    build:
      context: checkout
    ports:
      - '8003:8003'

  redis:
     image: redis:alpine@sha256:2afba59292f25f5d1af200496db41bea2c6c816b059f57ae74703a50a03a27d0
     ports:
       - '6379:6379'

  alloy:
    image: grafana/alloy@sha256:8abcd0d97a97099cabb34be8dcfc448fca6c35931ae9291aaf74056105dedcca
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
    ports:
      - '12345:12345'

  load:
    build:
      context: load
      dockerfile: Dockerfile
    volumes:
      - ./load/script.js:/etc/script.js
    command: run /etc/script.js
    restart: always
    depends_on:
      frontproxy:
        condition: service_started
